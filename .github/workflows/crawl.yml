name: 保险产品数据抓取

on:
  schedule:
    # 每周一凌晨2点执行（北京时间）
    - cron: '0 18 * * 0'
  workflow_dispatch:  # 手动触发

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 安装依赖
      run: pip install requests aiohttp beautifulsoup4

    - name: 运行抓取
      env:
        TCB_ENV_ID: ${{ secrets.TCB_ENV_ID }}
        TCB_SECRET_ID: ${{ secrets.TCB_SECRET_ID }}
        TCB_SECRET_KEY: ${{ secrets.TCB_SECRET_KEY }}
      run: python main.py

    - name: 上传结果
      uses: actions/upload-artifact@v4
      with:
        name: products
        path: products_*.json
